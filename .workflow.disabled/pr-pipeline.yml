version: '1.0'
name: pr-pipeline
displayName: PRPipeline
# 触发：向 main 发起的 Pull Request（合并前完整 DoD）
# 内容：后端 lint + pytest（含覆盖率） + 脚本漂移 + 前端构建

stages:
  - stage:
    name: backend
    displayName: 后端 DoD
    steps:
      - step: build@python
        name: backend_dod
        displayName: ruff + pytest + drift
        pythonVersion: '3.9'
        commands:
          - python3 -m pip install --upgrade pip
          - pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip3 install --user -e "./backend[dev]"
          - export PATH="$HOME/.local/bin:$PATH"
          - ruff check backend
          - cd backend && python3 -m pytest -q --cov=app --cov-fail-under=70
          - cd ..
          - python3 scripts/build_scripts.py --check

  - stage:
    name: frontend
    displayName: 前端 DoD
    steps:
      - step: build@nodejs
        name: frontend_build
        displayName: vue-tsc + vitest + build
        nodeVersion: '20.18.0'
        commands:
          - cd frontend
          - npm config set registry https://registry.npmmirror.com
          - npm ci --no-audit --no-fund
          - npm test
          - npm run build

triggers:
  pr:
    branches:
      include:
        - main
        - master
