version: '1.0'
name: branch-pipeline
displayName: BranchPipeline
# 触发：除 main 外的分支 push（特性分支冒烟）
# 内容：lint + 后端 pytest + 脚本漂移检查（不发布制品）

stages:
  - stage:
    name: backend
    displayName: 后端测试
    steps:
      - step: build@python
        name: backend_lint_test
        displayName: ruff + pytest + drift
        pythonVersion: '3.9'
        commands:
          - python3 -m pip install --upgrade pip
          - pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          # 使用 backend/pyproject.toml 安装依赖，附带 dev extras
          - pip3 install --user -e "./backend[dev]"
          - export PATH="$HOME/.local/bin:$PATH"
          - ruff check backend
          - cd backend && python3 -m pytest -q --cov=app --cov-fail-under=70
          - cd ..
          - python3 scripts/build_scripts.py --check

triggers:
  push:
    branches:
      exclude:
        - main
        - master
      include:
        - .*
