version: '1.0'
name: master-pipeline
displayName: MasterPipeline
# 触发：push 到 main / master（默认分支落库后的完整 DoD + 制品发布）
# 内容：后端 lint + pytest + 漂移 + 前端构建 + 打包发布制品

stages:
  - stage:
    name: backend
    displayName: 后端 DoD
    steps:
      - step: build@python
        name: backend_dod
        displayName: ruff + pytest + drift
        pythonVersion: '3.9'
        commands:
          - python3 -m pip install --upgrade pip
          - pip3 config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip3 install --user -e "./backend[dev]"
          - export PATH="$HOME/.local/bin:$PATH"
          - ruff check backend
          - cd backend && python3 -m pytest -q --cov=app --cov-fail-under=70
          - cd ..
          - python3 scripts/build_scripts.py --check

  - stage:
    name: frontend
    displayName: 前端 DoD + 构建
    steps:
      - step: build@nodejs
        name: frontend_build
        displayName: vue-tsc + vitest + vite build
        nodeVersion: '20.18.0'
        artifacts:
          - name: FRONTEND_DIST
            path:
              - frontend/dist
        commands:
          - cd frontend
          - npm config set registry https://registry.npmmirror.com
          - npm ci --no-audit --no-fund
          - npm test
          - npm run build
      - step: publish@general_artifacts
        name: publish_frontend_dist
        displayName: 上传前端制品
        dependArtifact: FRONTEND_DIST
        artifactName: ai-ppt-maker-frontend
        dependsOn: frontend_build

triggers:
  push:
    branches:
      include:
        - main
        - master
