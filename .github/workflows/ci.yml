name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app tests
      - name: Test + coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=70
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend (Vue 3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npx vue-tsc -b --noEmit
        continue-on-error: true   # M1 not blocking; M2 flip to blocking
      - run: npm run test --silent
      - run: npm run build

  drift:
    name: Generated-file drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install yaml
        run: pip install PyYAML
      - name: Verify line endings (.bat must be CRLF)
        run: |
          set -e
          shopt -s nullglob
          bad=0
          for f in $(git ls-files '*.bat' '*.cmd' '*.ps1' || true); do
            if ! file "$f" | grep -qi 'CRLF'; then
              echo "::error file=$f::expected CRLF line endings"
              bad=1
            fi
          done
          exit $bad
      - name: build_scripts.py --check (install.bat / deploy.bat / cleanup.bat sync)
        run: python scripts/build_scripts.py --check
      - name: Templates schema sanity
        run: |
          python3 - <<'PY'
          import pathlib, yaml, sys
          required = {"cover","toc","section-divider","content-bullets",
                      "content-image","content-table","closing"}
          root = pathlib.Path("backend/templates")
          fail = False
          for d in sorted(root.iterdir()):
              if not d.is_dir(): continue
              m = d / "layout-mapping.yaml"
              if not m.exists():
                  print(f"::error::{m} missing"); fail = True; continue
              data = yaml.safe_load(m.read_text(encoding="utf-8")) or {}
              layouts = set((data.get("layouts") or {}).keys())
              missing = required - layouts
              if missing:
                  print(f"::error::{d.name} missing layouts: {sorted(missing)}")
                  fail = True
          sys.exit(1 if fail else 0)
          PY
