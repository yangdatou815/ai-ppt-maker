services:
  backend:
    build:
      context: ./backend
    container_name: ai-ppt-maker-backend
    env_file: .env
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    ports:
      - "8080:8080"
    volumes:
      - ./backend/templates:/app/templates:ro
      - workspace:/tmp/ai-ppt-maker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/healthz')"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    container_name: ai-ppt-maker-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  workspace:
