version: '1.0'
name: ai-ppt-maker
displayName: ai-ppt-maker-pipeline
# Gitee Go 2.x schema (verified 2026-05-07).
# Notes for future edits:
#   - displayName must be ASCII (letters/digits/dash/underscore). 中文/空格被拒。
#   - step plugin fields go *directly* under `step:`, NOT nested under `inputs:`.
#   - each stage needs `strategy: naturally` + `trigger: auto`.
#   - each step needs `artifacts:` `caches:` `notify:` lists (empty OK) +
#     `strategy.retry`.
#   - frontend `build@nodejs` step is intentionally absent — the Node plugin's
#     real schema isn't yet captured. Add it once we have a working sample
#     from the Gitee Go graphical editor.
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - main
        - master
stages:
  - name: build_stage
    displayName: build-lint-drift
    strategy: naturally
    trigger: auto
    steps:
      - step: build@python
        name: build_python
        displayName: python-deps-ruff-drift
        pythonVersion: '3.9'
        commands:
          - python -m pip install --upgrade pip
          - pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip install --user -e "./backend[dev]"
          - export PATH="$HOME/.local/bin:$PATH"
          - ruff check backend
          - python scripts/build_scripts.py --check
          - python --version
        artifacts: []
        caches: []
        notify: []
        strategy:
          retry: '0'

  - name: test_stage
    displayName: pytest-cov70
    strategy: naturally
    trigger: auto
    steps:
      - step: build@python
        name: backend_pytest
        displayName: backend-pytest
        pythonVersion: '3.9'
        commands:
          - pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip install --user -e "./backend[dev]"
          - export PATH="$HOME/.local/bin:$PATH"
          - cd backend
          - python -m pytest -q --cov=app --cov-report=term-missing --cov-fail-under=70
        artifacts: []
        caches: []
        notify: []
        strategy:
          retry: '0'
