version: '1.0'
name: ai-ppt-maker
displayName: ai-ppt-maker-pipeline
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - main
        - master
stages:
  - name: build_stage
    displayName: build-lint-drift
    strategy: naturally
    trigger: auto
    steps:
      - step: build@python
        name: build_python
        displayName: python-deps-ruff-drift
        pythonVersion: '3.9'
        commands:
          - python -m pip install --upgrade pip
          - pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip install --user -e "./backend[dev]"
          - export PATH="$HOME/.local/bin:$PATH"
          - ruff check backend
          - python scripts/build_scripts.py --check
          - python --version
        caches: []
        notify: []
        strategy:
          retry: '0'
  - name: test_stage
    displayName: pytest-cov70
    strategy: naturally
    trigger: auto
    steps:
      - step: build@python
        name: backend_pytest
        displayName: backend-pytest
        pythonVersion: '3.9'
        commands:
          - pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
          - pip install --user -e "./backend[dev]"
          - export PATH="$HOME/.local/bin:$PATH"
          - cd backend
          - python -m pytest -q --cov=app --cov-report=term-missing --cov-fail-under=70
        caches: []
        notify: []
        strategy:
          retry: '0'
